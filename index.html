<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DVD Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Menu overlay ── -->
<div id="menu">
  <div id="menu-card">
    <div class="card-corner card-tl"></div>
    <div class="card-corner card-tr"></div>
    <div class="card-corner card-bl"></div>
    <div class="card-corner card-br"></div>

    <div id="menu-title-row">
      <span id="menu-title">DVD ARENA</span>
      <span id="menu-eyebrow"></span>
    </div>
    <div id="menu-tagline"></div>

    <div id="menu-body"></div>

    <button id="menu-btn"></button>
  </div>
</div>

<!-- ── Countdown ── -->
<div id="countdown" class="hidden">
  <span id="countdown-num"></span>
</div>

<!-- ── Boss HP bar ── -->
<div id="boss-bar">
  <div id="boss-name">D V D</div>
  <div id="boss-hp-track"><div id="boss-hp-fill"></div></div>
</div>
<div id="round-label"></div>

<!-- ── Canvas + handles ── -->
<div id="canvas-wrap">
  <div class="canvas-corner cc-tl" data-corner="tl"></div>
  <div class="canvas-corner cc-tr" data-corner="tr"></div>
  <div class="canvas-corner cc-bl" data-corner="bl"></div>
  <div class="canvas-corner cc-br" data-corner="br"></div>
  <div id="canvas">
    <div class="corner-zone top-left"     data-corner="tl"></div>
    <div class="corner-zone top-right"    data-corner="tr"></div>
    <div class="corner-zone bottom-left"  data-corner="bl"></div>
    <div class="corner-zone bottom-right" data-corner="br"></div>
    <div id="corner-flash"></div>
  </div>
  <div class="edge-flash" data-edge="n"></div>
  <div class="edge-flash" data-edge="s"></div>
  <div class="edge-flash" data-edge="w"></div>
  <div class="edge-flash" data-edge="e"></div>

</div>

<!-- ── Player damage flash ── -->
<div id="damage-vignette"></div>

<!-- ── Player HP bar ── -->
<div id="player-bar">
  <span id="player-label">YOU</span>
  <div id="player-hp-track"><div id="player-hp-fill"></div></div>
</div>

<div id="crt-overlay"></div>
<audio id="hit-sound" src="assets/sound/dvd_hit.wav" preload="auto"></audio>
<script src="game.js"></script>
</body>
</html>
